title: "<q>Zwischen Definition und Deutung</q> – Expert*inneninterviews als soziale Praxis im organisationalen Wandel"
abstract: "Expert*inneninterviews werden häufig genutzt, um Wissen über Organisationen und ihre Arbeitsabläufe zu gewinnen. Der Beitrag zeigt, dass Interviews jedoch mehr sind als ein Mittel zur Datenerhebung: Sie sind soziale Situationen, in denen Bedeutungen gemeinsam entwickelt, ausgehandelt und begrenzt werden. Grundlage der Analyse sind zehn leitfadengestützte Expert*inneninterviews, die im Rahmen einer Masterarbeit zur Einführung eines Forschungsinformationssystems in einer wissenschaftlichen Einrichtung geführt wurden. Anhand dieser Interviews wird deutlich, wie organisationale Rollen, unterschiedliche Begriffsverständnisse und institutionelle Rahmenbedingungen die Gespräche prägen. Der Beitrag diskutiert, welche Erkenntnisse Expert*inneninterviews in Veränderungsprozessen ermöglichen, wo ihre Grenzen liegen und warum eine reflektierte Interpretation der Interviewsituation für die qualitative Organisationsforschung wichtig ist."
