title: "Expert*inneninterviews als Methode bibliothekswissenschaftlicher Forschung"
abstract: "Basis für das Schreiben von Hochschulschriften ist nicht nur das Finden einer passenden Forschungsfrage, sondern vor allem auch das Festlegen der Methodik, mit der die Daten, die für die Beantwortung der Frage benötigt werden, erhoben werden sollen. Gerade im Rahmen einer Dissertation wird der Entwicklung des methodischen Vorgehens sogar ein ganzes Kapitel gewidmet – dem sogenannten Forschungsdesign. Die Anzahl der Instrumente, mit denen Forschungsdaten ermittelt werden können, ist groß, wobei zwischen quantitativen und qualitativen Methoden unterschieden werden kann. Die Methodik steht dabei in Wechselwirkung mit der zu behandelnden Forschungsfrage. Letztere legt fest, welche der Forschungsmethoden sich am besten für die Beantwortung der Frage eignet. In vielen Fällen eignen sich geplante Gespräche mit Fachleuten, die in dem Metier des Untersuchungsgegenstandes tätig sind. Was man unter den sogenannten Expert*inneninterviews versteht, wie sie durchgeführt und ausgewertet werden und welchen Nutzen sie im Bereich der Bibliothekswissenschaft haben, sollen die folgenden Ausführungen zeigen."
abstractalt: "The basis for an academic thesis does not consist solely of an appropriate research question.  The definition of the methodology by which the required data are to be collected is necessary as well. In the context of a dissertation, the development of the methodological approach is even given an entire chapter—the so-called research design. The number of instruments available for collecting research data is huge, with a distinction being made between quantitative and qualitative methods. Methodology is closely interrelated with the research question under investigation, as the latter determines which research methods are best suited to answering the question. In many cases, planned interviews with experts who work in the professional field related to the subject of investigation are particularly suitable. The following discussion will explain what is meant by so-called "expert interviews", how they are conducted and analyzed, and what benefits they offer in the field of library and information science."
